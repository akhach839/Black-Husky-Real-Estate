<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Husky Real Estate</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f5f6f8;
  color: #111827;
}

header {
  text-align: center;
  padding: 20px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
}

header img {
  width: 420px;
  max-width: 100%;
}

.container {
  width: 1200px;
  margin: auto;
  padding: 30px 0;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 40px;
  text-align: center;
}

.stat h3 {
  margin: 0;
  color: #16a34a;
}

.grid {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
}

.card {
  flex: 1 1 calc(25% - 25px);
  background: white;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #e5e7eb;
}

/* GALLERY */
.gallery {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
}

.gallery-track {
  display: flex;
  transition: transform 0.3s ease;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  flex-shrink: 0;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
}

.left { left: 5px; }
.right { right: 5px; }

/* MOBILE SQUARE */
@media (max-width: 768px) {
  .gallery {
    aspect-ratio: 1/1;
    height: auto;
  }

  .gallery img {
    height: 100%;
    object-fit: contain;
    background: #f3f4f6;
  }

  .card {
    flex: 1 1 100%;
  }

  .container {
    width: 95%;
  }
}

.content {
  padding: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.green { color: #16a34a; }
.rate { color: #2563eb; }
</style>
</head>

<body>

<header>
  <img src="./husky.png">
</header>

<div class="container">

<div class="stats">
  <div class="stat">
    <h3>$4,870+</h3>
    <p>Monthly Cash Flow</p>
  </div>
  <div class="stat">
    <h3>$58K+</h3>
    <p>Annual Income</p>
  </div>
</div>

<div class="grid">

<!-- CARD -->
<div class="card">
  <div class="gallery">
    <div class="gallery-track">
      <img src="./auroracondo.jpg">
      <img src="./auroracondo.jpg">
      <img src="./auroracondo.jpg">
    </div>
    <button class="arrow left">&#10094;</button>
    <button class="arrow right">&#10095;</button>
  </div>

  <div class="content">
    <h3>Aurora Condo</h3>
    <div class="row"><span>Rent</span><span class="green">$2,100</span></div>
    <div class="row"><span>Cash Flow</span><span class="green">$900</span></div>
    <div class="row"><span>Rate</span><span class="rate">2.5%</span></div>
  </div>
</div>

</div>

</div>

<script>
document.querySelectorAll(".gallery").forEach(gallery => {
  const track = gallery.querySelector(".gallery-track");
  const slides = track.children;
  let index = 0;

  const update = () => {
    track.style.transform = `translateX(-${index * 100}%)`;
  };

  gallery.querySelector(".right").onclick = () => {
    index = (index + 1) % slides.length;
    update();
  };

  gallery.querySelector(".left").onclick = () => {
    index = (index - 1 + slides.length) % slides.length;
    update();
  };

  // SWIPE SUPPORT
  let startX = 0;

  track.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  track.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;

    if (diff > 50) {
      index = (index - 1 + slides.length) % slides.length;
    } else if (diff < -50) {
      index = (index + 1) % slides.length;
    }

    update();
  });
});
</script>

</body>
</html>
