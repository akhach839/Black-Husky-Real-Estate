<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f5f6f8;
  color: #111827;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px 20px 0;
  background: #ffffff;
  border-bottom: 1px solid #e5e7eb;
}

header img {
  width: 600px;
  max-width: 100%;
}

/* CONTAINER */
.container {
  width: 1200px; /* 🔥 FIX: fixed width ensures 3 fit */
  margin: auto;
  padding: 20px 0;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  text-align: center;
}

.stat {
  flex: 1;
}

.stat h3 {
  margin: 0;
  color: #16a34a;
  font-size: 28px;
}

/* GRID — FORCE 3 */
.grid {
  display: flex; /* 🔥 no wrapping grid issues */
  gap: 25px;
}

/* CARDS */
.card {
  flex: 1; /* 🔥 equal width */
  background: white;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #e5e7eb;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 5px;
}

.green {
  color: #16a34a;
  font-weight: 600;
}

/* MOBILE FALLBACK */
@media (max-width: 1250px) {
  .container {
    width: 95%;
  }
  .grid {
    flex-direction: column;
  }
}
</style>

</head>

<body>
